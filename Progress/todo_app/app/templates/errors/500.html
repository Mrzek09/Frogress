{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div style="text-align: center; padding: 100px 20px;">
    <div style="font-size: 72px; margin-bottom: 24px;">⚠️</div>
    <h1 style="font-size: 32px; margin-bottom: 16px; color: var(--dark);">Something Went Wrong</h1>
    <p style="color: var(--gray); margin-bottom: 32px;">An unexpected error occurred. Please try again later.</p>
    <a href="{{ url_for('main.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
        Go Home
    </a>
</div>
{% endblock %}
